<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leadership for Directors — Study Hub</title>
<style>
:root{
  color-scheme: light;
  --bg:#f6f7f9; --card:#ffffff; --ink:#1a2230; --muted:#5d6b80; --line:#e4e8ef;
  --brand:#1f4e8c; --brand2:#2f72c4; --accent:#0f7a5a; --warn:#b25b00; --bad:#b3261e;
  --chip:#eef3fb; --good-bg:#e7f5ee; --bad-bg:#fdecea; --shadow:0 1px 3px rgba(20,30,50,.08),0 8px 24px rgba(20,30,50,.05);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:960px;margin:0 auto;padding:18px 16px 60px}
header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
h1{font-size:21px;margin:0 0 2px}
.sub{color:var(--muted);font-size:13px;margin:0}
.overall{min-width:200px}
.bar{height:9px;background:#e9edf3;border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand2),var(--accent));width:0;transition:width .4s}
.tabs{display:flex;gap:6px;margin:18px 0 16px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);padding:6px 0;z-index:5}
.tab{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:8px 14px;border-radius:999px;cursor:pointer;font-weight:600;font-size:13px}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
.modtitle{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;margin:0}
.mnum{background:var(--chip);color:var(--brand);border-radius:8px;padding:3px 9px;font-size:13px;font-weight:700}
.lo{color:var(--muted);font-size:13px;margin:8px 0 0}
.miniprog{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
.section-list{list-style:none;margin:12px 0 0;padding:0;columns:2;column-gap:24px}
@media(max-width:640px){.section-list{columns:1}}
.section-list li{break-inside:avoid;display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:13.5px}
.section-list input{margin-top:3px;flex:0 0 auto;width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.section-list label{cursor:pointer}
.section-list .done label{color:var(--muted);text-decoration:line-through}
details.notes{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
details.notes summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--brand)}
textarea{width:100%;min-height:80px;margin-top:8px;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;resize:vertical;background:#fcfdff}
.saved{font-size:12px;color:var(--accent);margin-left:8px;opacity:0;transition:opacity .3s}
.summary{font-size:14px;color:#33414f;margin:10px 0 0}
.acs{margin:10px 0 0;padding-left:18px;font-size:13px;color:var(--muted)}
.acs li{margin:2px 0}
/* Flashcards */
.fc-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
select,.btn{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;font:inherit;font-weight:600;cursor:pointer;color:var(--ink)}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.5;cursor:default}
.flash{perspective:1200px;margin:0 auto;max-width:560px}
.flash-inner{position:relative;min-height:230px;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.flash.flip .flash-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:26px;display:flex;flex-direction:column;justify-content:center;text-align:center;background:var(--card)}
.face .tag{position:absolute;top:12px;left:14px;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.face.front .term{font-size:21px;font-weight:700}
.face.front .hint{color:var(--muted);font-size:12px;margin-top:14px}
.face.back{transform:rotateY(180deg);background:#fbfdff}
.face.back .def{font-size:15px;line-height:1.5}
.fc-nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px;max-width:560px;margin-left:auto;margin-right:auto}
.fc-count{color:var(--muted);font-size:13px}
.fc-known{display:flex;gap:8px}
.fclist-item{border-top:1px solid var(--line);padding:12px 2px}
.fclist-item:first-child{border-top:none}
.fclist-item h4{margin:0 0 4px;font-size:15px;color:var(--brand)}
.fclist-item h4 .tagm{font-weight:400;font-size:11.5px;color:var(--muted)}
.fclist-item p{margin:0;font-size:14px;color:#33414f;line-height:1.5}
.fclist-head{font-size:16px;font-weight:700;margin:0 0 4px}
/* Quiz */
.q{margin-bottom:14px}
.qtext{font-weight:600;margin:0 0 10px}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;background:var(--card);text-align:left;font:inherit}
.choice:hover{border-color:var(--brand2)}
.choice.sel{border-color:var(--brand);background:var(--chip)}
.choice.correct{border-color:var(--accent);background:var(--good-bg)}
.choice.wrong{border-color:var(--bad);background:var(--bad-bg)}
.explain{font-size:13px;color:#33414f;margin:8px 0 0;padding:8px 10px;background:#f4f7fb;border-radius:8px;display:none}
.explain.show{display:block}
.quiz-result{font-size:16px;font-weight:700;margin:0 0 6px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #cdd6e3;border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.note{font-size:12px;color:var(--muted)}
.hidden{display:none!important}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.kpi .box{flex:1;min-width:130px;background:var(--chip);border-radius:12px;padding:12px 14px}
.kpi .box b{display:block;font-size:22px;color:var(--brand)}
.kpi .box span{font-size:12px;color:var(--muted)}
.reset{font-size:12px;color:var(--bad);background:none;border:none;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Leadership for Directors</h1>

  <nav class="tabs">

        <label class="note">Week:</label>

      <div id="qzArea"></div>

</div>

<script>
/* ============ CONTENT (authored from the LFD handbook, v26.1) ============ */
const MODULES = [
{
  num:1, title:"What is leadership?",
  lo:"Understand the concepts of leadership and followership and define leadership in relation to the director's role on the board (LO1).",
  acs:["AC1.1 Contrast definitions of leadership; distinguish leadership from management.",
       "AC1.2 Analyse the leader's role re: vision, purpose, values and strategy.",
       "AC1.3 Describe characteristics of successful leaders; assess different leadership styles.",
       "AC1.4 Explain key theories and models of leadership.",
       "AC1.5 Examine followership and the leader–follower relationship."],
  summary:"Leadership has no single definition but generally involves influencing individuals or groups toward a common goal — and crucially requires followers (a title confers status, not authority). The module contrasts leadership (innovation, change, direction) with management (stability, efficiency), traces the progression of leadership theories and organisational structures, surveys leadership approaches and styles, and establishes followership as a reciprocal process in which followers choose whom to follow.",
  subs:["1.1 Defining leadership","1.2 Vision, purpose and values","1.2.1 Vision","1.2.2 Purpose","1.2.3 How vision and purpose create motive force","1.2.4 Values","1.3 Examples of leadership","1.3.1 The IoD Director Competency Framework","1.3.2 Leading at all levels","1.4 Theories and models of leadership","1.4.1 Progression of leadership theories","1.4.2 Progression of organisation structures and design","1.4.3 Leadership approaches","1.4.4 Adapting leadership styles","1.4.5 Smart ideas, smart organisations","1.4.6 International leadership","1.5 Followership","1.5.1 What do followers need?","1.5.2 What should followers provide?","1.5.3 Leaders, followers and trust","1.5.4 Defining followers","1.5.5 The directors' role in followership","1.6 What does this mean for me?"],
  flash:[
    {t:"Leadership (working definition)",d:"An individual or group influencing another individual or group to move toward a common goal. Leaders inevitably need followers — a title conveys status but does not guarantee authority or create followers."},
    {t:"Leadership vs management (Yukl)",d:"Managers are oriented toward stability and efficiency (getting people to do things more efficiently); leaders are oriented toward innovation and change (taking people in new directions). Both are essential."},
    {t:"Peter Drucker on leadership",d:"“The only definition of a leader is someone who has followers.” Emphasises that followership is the defining test of leadership."},
    {t:"Warren Bennis on leadership",d:"“Leadership is the capacity to translate vision into reality.”"},
    {t:"Vision",d:"A clear and compelling view of what the future of the organisation could look like — the destination that inspires and aligns effort."},
    {t:"Purpose",d:"The reason why an organisation exists. Together with vision it creates 'motive force' — the motivation that drives people to act."},
    {t:"Values",d:"The principles that indicate how people should behave while delivering the vision and purpose; the behavioural backbone of culture."},
    {t:"Followership",d:"A reciprocal process: followers actively or passively decide whom they will follow. Leaders cannot lead unless followers follow (Kellerman)."},
    {t:"Charismatic leadership (caution)",d:"Charismatic leaders inspire through vision and energy and can have major impact, but a charisma-led view risks treating leadership as an unteachable mystery and over-relying on one personality."},
    {t:"Leading at all levels",d:"Directors must enable others to lead when appropriate — ensuring everyone has the ability, confidence and motivation to contribute their best thinking, not just those with formal titles."},
    {t:"Trust (in leadership)",d:"The foundation of the leader–follower relationship; without trust, influence and willing followership break down."}
  ],
  quiz:[
    {q:"According to the handbook, what is the one element every definition of leadership ultimately requires?",c:["A formal job title","Followers","Charisma","A strategic plan"],a:1,e:"Drucker: 'The only definition of a leader is someone who has followers.' A title conveys status but does not create followers."},
    {q:"Per Yukl, how do leaders and managers primarily differ in orientation?",c:["Leaders favour stability; managers favour innovation","Leaders favour innovation; managers favour stability/efficiency","They are identical in practice","Managers need followers; leaders do not"],a:1,e:"Managers are oriented toward stability and efficiency; leaders are oriented toward innovation and change. Both remain essential."},
    {q:"What does the handbook mean by an organisation's 'purpose'?",c:["The future state it aspires to","The reason why the organisation exists","Its annual financial targets","Its code of conduct"],a:1,e:"Purpose = why the organisation exists; vision = the compelling future view. Together they create motive force."},
    {q:"Which best describes 'followership' as presented in the module?",c:["Passive obedience to authority","A reciprocal process in which followers choose whom to follow","A management technique for delegation","Something only relevant to junior staff"],a:1,e:"Followership is reciprocal — followers decide, actively or passively, whom they will follow (Kellerman)."},
    {q:"Bennis defined leadership as the capacity to do what?",c:["Maximise shareholder value","Translate vision into reality","Control risk","Maintain operational stability"],a:1,e:"Warren Bennis: 'Leadership is the capacity to translate vision into reality.'"},
    {q:"What is a risk of an exclusively charisma-led view of leadership?",c:["It overstates the role of process","It treats leadership as an unteachable mystery reliant on one personality","It ignores vision entirely","It eliminates the need for followers"],a:1,e:"A charisma-led view can treat leadership as a mystery and over-rely on a single charismatic figure, downplaying learnable practice."},
    {q:"Why does the handbook stress 'leading at all levels'?",c:["To reduce the board's accountability","Because directors should enable others to lead so the whole organisation contributes its best thinking","Because titles are the main source of authority","To centralise decisions on the chair"],a:1,e:"Directors should bring out the best in others and enable them to lead when appropriate, not reserve leadership to title-holders."}
  ]
},
{
  num:2, title:"Understanding yourself and others",
  lo:"Develop greater self-awareness and awareness of others' motivations and behaviours, and how this contributes to inspirational leadership (LO2).",
  acs:["AC2.1 Apply understanding of people's different psychologies to collective decision making.",
       "AC2.2 Describe the value of self/other awareness to effective leadership.",
       "AC2.3 Compare approaches to building self-awareness (assessment tools, coaching).",
       "AC2.4 Identify the negative side of emotional intelligence and toxic leadership.",
       "AC2.5 Describe approaches to identify and develop leadership talent.",
       "AC2.6 Identify key interpersonal skills required in leadership.",
       "AC2.7 Apply theories of motivation and attribution to future action."],
  summary:"The hardest boardroom challenges are usually human, not technical. This module grounds leadership in neuroscience and psychology — the brain as a 'survival machine' running unconscious heuristics and the fight-or-flight stress response — then builds out emotional intelligence (self-awareness, self-management, social awareness, social skills) and its dark side. It covers toxic leadership and remedies, decision-making under bounded rationality and bias (fast vs slow thinking, stress), personal brand, developing and retaining talent, defining potential, and theories of motivation.",
  subs:["2.1 Introduction","2.2 Neuroscience and psychology in leadership","2.2.1 Ambiguity tolerance","2.2.2 Regulatory focus","2.2.3 Kirton Adaptation-Innovation Inventory (KAI)","2.3 Emotional intelligence","2.3.1 The three main models of EI","2.3.2 Self-awareness","2.3.3 Self-management","2.3.4 Social awareness","2.3.5 Social skills","2.3.6 The dark side of emotional intelligence","2.4 Toxic leadership","2.4.1 What to do about toxic leaders?","2.5 Making decisions","2.5.1 Bounded rationality and imperfect information","2.5.2 Fast and slow thinking","2.5.3 Managing stress in decision making","2.5.4 Decision-making biases","2.5.5 Personal bias","2.6 Leadership and personal brand","2.7 Developing leadership talent","2.7.1 Attracting and retaining talent","2.7.2 Defining potential","2.8 Motivation and leadership","2.8.1 Theories of motivation","2.9 What does this mean for me?"],
  flash:[
    {t:"Emotional intelligence (4 domains)",d:"Self-awareness, self-management, social awareness, and social skills — the core competencies underpinning effective interpersonal leadership."},
    {t:"The brain as a 'survival machine'",d:"Evolved primarily to keep us alive, running countless unconscious heuristics on limited sensory sampling — so much behaviour is automatic and outside conscious control."},
    {t:"Fight-or-flight response",d:"The autonomic stress response: adrenaline/noradrenaline/cortisol raise heart rate, blood pressure and breathing; blood shifts to large muscles — impairing calm, reflective decision making."},
    {t:"Ambiguity tolerance",d:"An individual's capacity to function comfortably amid uncertain, incomplete or contradictory information — important for directors operating without perfect data."},
    {t:"Regulatory focus",d:"Whether a person is promotion-focused (pursuing gains/aspirations) or prevention-focused (avoiding losses/maintaining security) — shapes risk and decision behaviour."},
    {t:"Kirton Adaptation-Innovation (KAI)",d:"A measure of cognitive style on an adaptor–innovator spectrum: adaptors improve within the existing framework; innovators prefer to do things differently and challenge the framework."},
    {t:"The dark side of EI",d:"Emotional intelligence skills can be misused to manipulate, deceive or control others — high EI is not inherently ethical."},
    {t:"Toxic leadership",d:"Destructive leadership behaviour (e.g., abusive, self-serving, undermining) that harms followers and the organisation; the board must recognise and act on it."},
    {t:"Bounded rationality",d:"Decisions are made with imperfect information and limited cognitive capacity, so leaders 'satisfice' rather than optimise — awareness of this guards against overconfidence."},
    {t:"Fast and slow thinking (Kahneman)",d:"System 1 is fast, automatic, intuitive and bias-prone; System 2 is slow, effortful and analytical. Good decisions require knowing when to engage slow thinking."},
    {t:"Personal brand",d:"The consistent reputation and impression a leader creates; deliberately managed authenticity and integrity strengthen influence."},
    {t:"Defining potential",d:"Identifying who can grow into bigger roles — assessing aspiration, ability and engagement rather than just current performance."}
  ],
  quiz:[
    {q:"What does the handbook identify as the main source of board/organisational challenge?",c:["Lack of technical competence","The human side — psychology and neuroscience","Insufficient financial reporting","Regulatory complexity"],a:1,e:"Technical competence is rarely the main challenge; the difficulties usually lie in the human domain of psychology and neuroscience."},
    {q:"Which are the four domains of emotional intelligence used in the module?",c:["IQ, EQ, SQ, PQ","Self-awareness, self-management, social awareness, social skills","Vision, purpose, values, strategy","Adaptor, innovator, promoter, preventer"],a:1,e:"The four EI domains: self-awareness, self-management, social awareness and social skills."},
    {q:"In the fight-or-flight response, blood is preferentially directed to…",c:["The digestive system","The large muscles of the arms and legs","The skin","The kidneys"],a:1,e:"Blood is shunted from digestion to the large muscles to prepare for physical response — one reason stress impairs calm deliberation."},
    {q:"The Kirton Adaptation-Innovation Inventory (KAI) measures…",c:["Emotional stability","Cognitive style on an adaptor–innovator spectrum","Ambiguity tolerance only","Risk appetite"],a:1,e:"KAI places people on an adaptor (improve within the framework) to innovator (do things differently) spectrum."},
    {q:"Which statement about emotional intelligence is accurate per the module?",c:["High EI guarantees ethical behaviour","EI can be misused to manipulate or deceive (a 'dark side')","EI is irrelevant at board level","EI is fixed and cannot be developed"],a:1,e:"EI has a dark side — its skills can be turned to manipulation or control; it is not inherently ethical."},
    {q:"'Bounded rationality' refers to the idea that leaders…",c:["Always optimise decisions with full data","Decide with imperfect information and limited cognition, tending to satisfice","Avoid all cognitive bias","Rely only on intuition"],a:1,e:"Bounded rationality: imperfect information and limited capacity mean leaders satisfice rather than perfectly optimise."},
    {q:"In Kahneman's terms, which system is fast, automatic and most prone to bias?",c:["System 1","System 2","System 3","The autonomic system"],a:0,e:"System 1 is fast, intuitive and bias-prone; System 2 is slow and analytical."},
    {q:"'Regulatory focus' distinguishes between people who are…",c:["Adaptors vs innovators","Promotion-focused vs prevention-focused","Introverts vs extroverts","Transactional vs transformational"],a:1,e:"Regulatory focus contrasts promotion focus (pursuing gains) with prevention focus (avoiding losses/security)."}
  ]
},
{
  num:3, title:"Leading teams",
  lo:"Understand how leaders build and sustain high-performing teams, including the board itself (LO3).",
  acs:["AC3.1 Summarise the purpose of teams and the importance of commitment and competence.",
       "AC3.2 Describe factors required to develop high-performing teams.",
       "AC3.3 Define equity, diversity and inclusion and their impact on performance.",
       "AC3.4 Apply board dynamics to evaluating high-performing vs dysfunctional boards.",
       "AC3.5 Evaluate approaches and tools for dealing with conflict within teams."],
  summary:"High-performing teams rest on a shared, measurable purpose plus commitment, competence (technical, problem-solving, social/interpersonal) and high trust. The module addresses team development, the special demands of virtual/dispersed teams (psychological-emotional-social and operational needs), common team problems (social loafing, evaluation apprehension, the Einstellung effect, complacency), and psychological safety via the Clark model. It then applies all of this to the board as a team — composition, EDI, induction, succession, board dynamics, dysfunction, responsibilities/liabilities, conflict, and the chair's role.",
  subs:["3.1 How to construct successful teams","3.2 Team development","3.3 Virtual (dispersed) team","3.3.1 PSE needs","3.3.2 Operational needs","3.4 Problems in teams","3.4.1 Social loafing","3.4.2 Evaluation apprehension","3.4.3 Einstellung effect","3.4.4 Complacency","3.5 Psychological safety","3.5.1 The Clark model","3.6 The board as a team","3.6.1 Board composition","3.6.2 Equity, diversity and inclusion (EDI) on boards","3.6.3 Effective induction of directors","3.6.4 Succession planning","3.7 Board dynamics","3.7.1 Dysfunctional boards","3.7.2 Board team selection","3.7.3 Responsibilities and liabilities","3.7.4 Structures and processes","3.8 Dealing with conflict","3.9 The role of the chair in a high-performing board","3.10 What does this mean for me?"],
  flash:[
    {t:"Four foundations of a successful team",d:"A shared, measurable Purpose; Commitment (ownership of goals and roles); Competence; and Trust. (Commitment tends to fall as team size grows.)"},
    {t:"Three competencies of a team",d:"Technical competence (specialist knowledge/skills), problem-solving competence (sense-making in ambiguity), and social/interpersonal competence (communicating and working with people)."},
    {t:"Team purpose",d:"A clear, common purpose intrinsic to the team's identity and owned by all members — simultaneously attainable and stretching, and measurable at team and individual levels."},
    {t:"Trust in high-performing teams",d:"Confidence in others' knowledge and contribution, plus belief they can be relied on for honesty, openness and steadfast support under pressure — especially vital at board level."},
    {t:"Social loafing",d:"The tendency of individuals to exert less effort when working in a group than when working alone — a problem teams must design against."},
    {t:"Evaluation apprehension",d:"Holding back contributions for fear of being judged — suppresses ideas and undermines team performance and innovation."},
    {t:"Einstellung effect",d:"The tendency to apply a familiar solution and ignore better alternatives because a known approach comes to mind first."},
    {t:"Psychological safety",d:"A shared belief that the team is safe for interpersonal risk-taking — members can speak up, question and admit mistakes without fear of punishment or humiliation."},
    {t:"The Clark model (4 stages)",d:"Stages of psychological safety: inclusion safety, learner safety, contributor safety, and challenger safety — progressing from belonging to safely challenging the status quo."},
    {t:"EDI on boards",d:"Equity, diversity and inclusion improve board and organisational performance by widening perspectives and reducing groupthink — diversity must be paired with genuine inclusion to deliver value."},
    {t:"Dysfunctional board signs",d:"Poor dynamics such as dominance, groupthink, disengagement, lack of challenge, or unmanaged conflict — undermining the board's effectiveness as a team."},
    {t:"Role of the chair",d:"Sets tone and dynamics, ensures balanced participation and constructive challenge, manages conflict, and builds the trust that makes a board high-performing."}
  ],
  quiz:[
    {q:"Which set best captures the foundations of a successful team in the handbook?",c:["Vision, mission, values, strategy","Purpose, commitment, competence, trust","Inclusion, learner, contributor, challenger","Speed, cost, quality, scope"],a:1,e:"Successful teams need a shared measurable purpose plus commitment, competence and trust."},
    {q:"The three competencies required within a successful team are technical, social/interpersonal, and…",c:["Financial competence","Problem-solving competence","Regulatory competence","Charismatic competence"],a:1,e:"Technical, problem-solving, and social/interpersonal competence are the three required."},

/* State is encoded as base64 in the URL hash — bookmark the URL to carry
   progress across devices. localStorage is kept as a same-device cache. */
const LS="lfd_study_v1";
let memStore=null;

function encodeState(s){
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(s))))}catch(e){return null;}
}
function decodeState(str){
  try{return JSON.parse(decodeURIComponent(escape(atob(str))))}catch(e){return null;}
}
function stateFromHash(){
  const h=location.hash.replace(/^#/,"").trim();
  if(h.length<10)return null;
  return decodeState(h);
}
function pushStateToHash(s){
  const enc=encodeState(s);
  if(enc)history.replaceState(null,"","#"+enc);
}

function load(){
  const fromHash=stateFromHash();
  if(fromHash)return fromHash;
  try{return JSON.parse(localStorage.getItem(LS))||{}}
  catch(e){return memStore||{}}
}
function save(s){
  memStore=s;
  try{localStorage.setItem(LS,JSON.stringify(s))}catch(e){}
  pushStateToHash(s);
  updateShareLink();
}

function updateShareLink(){
  const el=document.getElementById("shareLink");
  if(el)el.href=location.href;
}

let state=load();
state.done=state.done||{};
state.notes=state.notes||{};
state.known=state.known||{};
state.best=state.best||{};
state.plan=state.plan||{};
save(state);

  const totalDays=PLAN.reduce((n,w)=>n+w.days.length,0);
  const doneDays=PLAN.reduce((n,w)=>n+w.days.filter(d=>state.plan[d.id]).length,0);
  const pct=Math.round(doneDays/totalDays*100);
  const totalPages=PLAN.reduce((n,w)=>n+weekPages(w),0);
  const donePages=PLAN.reduce((n,w)=>n+w.days.filter(d=>state.plan[d.id]).reduce((a,d)=>a+pageCount(d.p),0),0);
  let h=`<div class="card">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <h2 class="modtitle" style="font-size:17px">5-week plan · Sun Jun 28 → Sat Aug 1</h2>
      <span class="miniprog">Exam 12 Aug · Aug 2–11 = revision buffer</span>
    </div>
    <p class="note" style="margin:6px 0 10px">${totalPages} pages (p36–218) · ~${Math.round(totalPages/5)} pp/week. You finished through p35 — tick each day as you go.</p>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <p class="sub" style="margin-top:6px">${pct}% · ${doneDays}/${totalDays} days · ${donePages}/${totalPages} pages read</p>
  </div>`;
  PLAN.forEach(w=>{
    const wd=w.days.filter(d=>state.plan[d.id]).length, wt=w.days.length;
    const wdone=wd===wt;const wp=weekPages(w);
    h+=`<div class="card">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="mnum">Week ${w.wk}</span>
        <b style="font-size:14px">${esc(w.dates)}</b>
        <span class="mnum" style="background:#e7f1ff;color:var(--brand2)">${esc(w.range)}</span>
        <span class="mnum" style="background:var(--good-bg);color:var(--accent)">${wp} pages</span>
        <span class="miniprog">${wd}/${wt} ${wdone?'✓':''}</span>
      </div>
      <p class="lo" style="margin-top:6px"><b>Goal:</b> ${esc(w.goal)}</p>
      <div style="margin-top:10px">`;
    w.days.forEach(d=>{
      const on=!!state.plan[d.id];const rev=/Review|Catch|Buffer/i.test(d.p);
      const pp=pageCount(d.p);
      h+=`<label class="planrow ${on?'done':''}" style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-top:1px solid var(--line);cursor:pointer">
        <input type="checkbox" data-pid="${d.id}" ${on?'checked':''} style="margin-top:3px;width:16px;height:16px;accent-color:var(--accent);flex:0 0 auto">
        <span style="flex:0 0 92px;font-weight:600;font-size:12.5px;color:var(--muted)">${esc(d.d)}</span>
        <span class="mnum" style="flex:0 0 auto;font-size:11.5px;${rev?'background:#fdf3e7;color:var(--warn)':''}">${esc(d.p)}</span>
        <span style="flex:0 0 auto;font-size:11.5px;color:var(--muted);min-width:42px">${pp?pp+' pp':'—'}</span>
        <span style="font-size:13px">${esc(d.t)}</span>
      </label>`;
    });
    h+=`</div></div>`;
  });
  $("#tab-plan").innerHTML=h;
  $$('#tab-plan input[type=checkbox]').forEach(cb=>cb.onchange=()=>{
    state.plan[cb.dataset.pid]=cb.checked;save(state);
    cb.closest(".planrow").classList.toggle("done",cb.checked);
    renderPlan();renderProgress();
  });
}


/* ============ SUMMARY ============ */
function renderSummary(){
  const sel=$("#sumWeek").value;
  let h="";
  [1,2,3,4,5].forEach(wk=>{
    if(sel!=="all"&&+sel!==wk)return;
    const entries=[];
    MODULES.forEach(m=>m.flash.forEach((f,i)=>{if(FC_WEEK[m.num][i]===wk)entries.push({...f,mod:m.num,title:m.title});}));
    if(!entries.length)return;
    const weekPlan=PLAN[wk-1];
    h+=`<div class="card">
      <h2 class="modtitle" style="font-size:16px;margin-bottom:2px">Week ${wk} · ${esc(weekPlan.dates)}</h2>
      <p class="lo" style="margin:0 0 12px">${esc(weekPlan.goal)}</p>`;
    entries.forEach(e=>{
      h+=`<div class="fclist-item">
        <h4>${esc(e.t)} <span class="tagm">M${e.mod}</span></h4>
        <p>${esc(e.d)}</p>
      </div>`;
    });
    h+=`</div>`;
  });
  $("#sumArea").innerHTML=h||`<p class="note">Nothing to show.</p>`;
}
function initSummary(){
  renderSummary();
  $("#sumWeek").onchange=renderSummary;
}

/* ============ QUIZ ============ */
function initQuiz(){
  const sel=$("#qzModule");sel.innerHTML='<option value="all">All weeks (mixed)</option>'+[1,2,3,4,5].map(w=>`<option value="${w}">Week ${w}</option>`).join("");
  $("#qzStart").onclick=()=>startQuiz(false);
  $("#qzAI").onclick=()=>startQuiz(true);
}
function pickQuestions(){
  const sel=$("#qzModule").value;let pool=[];
  MODULES.forEach(m=>m.quiz.forEach((q,i)=>{const wk=QZ_WEEK[m.num][i];if(sel==="all"||+sel===wk)pool.push({...q,mod:m.num,wk});}));
  for(let i=pool.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pool[i],pool[j]]=[pool[j],pool[i]]}
  return pool.slice(0,Math.min(6,pool.length));
}
async function startQuiz(useAI){
  const area=$("#qzArea");const sel=$("#qzModule").value;
  let qs;
  if(useAI){
    area.innerHTML=`<p class="note"><span class="spin"></span>Generating fresh questions with Claude…</p>`;
    qs=await aiQuestions(sel);
    if(!qs||!qs.length){area.innerHTML=`<p class="note">Couldn't generate AI questions right now — using the built-in set instead.</p>`;qs=pickQuestions();}
  } else {qs=pickQuestions();}
  renderQuiz(qs,sel);
}
async function aiQuestions(sel){
  if(!(window.cowork&&window.cowork.askClaude))return null;
  // gather the flashcard material that falls in the selected week (or all weeks)
  let terms=[];const titles=new Set();
  MODULES.forEach(m=>m.flash.forEach((f,i)=>{const wk=FC_WEEK[m.num][i];if(sel==="all"||+sel===wk){terms.push(`${f.t}: ${f.d}`);titles.add(`M${m.num} ${m.title}`);}}));
  const scope=sel==="all"?"the whole handbook":("study-plan Week "+sel);
  const ctx=`Scope: ${scope}. Modules covered: ${[...titles].join("; ")}\n\nKey points:\n${terms.join("\n")}`;
  const prompt=`You are writing exam-style multiple-choice questions for the IoD "Leadership for Directors" handbook, for ${scope}. Using ONLY the material below, write 6 fresh, non-trivial multiple-choice questions (4 options each, exactly one correct). Vary difficulty. Return STRICT JSON: an array of objects {"q":"...","c":["a","b","c","d"],"a":<0-3 index of correct>,"e":"one-sentence explanation","mod":<module number>}. No prose, JSON only.\n\nMATERIAL:\n${ctx}`;
  try{
    const r=await window.cowork.askClaude(prompt,[]);
    const txt=typeof r==="string"?r:(r&&(r.text||r.content||JSON.stringify(r)));
    const m=txt.match(/\[[\s\S]*\]/);if(!m)return null;
    const arr=JSON.parse(m[0]);
    return arr.filter(o=>o&&o.c&&o.c.length===4&&typeof o.a==="number");
  }catch(e){return null}
}
function renderQuiz(qs,sel){
  const area=$("#qzArea");
  if(!qs.length){area.innerHTML="<p class='note'>No questions available.</p>";return;}
  let h=`<div id="quizForm">`;
  qs.forEach((q,i)=>{
    h+=`<div class="card q" data-i="${i}"><p class="qtext">${i+1}. ${esc(q.q)} <span class="note">(M${q.mod})</span></p><div class="choices">`;
    q.c.forEach((c,ci)=>h+=`<button class="choice" data-i="${i}" data-c="${ci}">${esc(c)}</button>`);
    h+=`</div><p class="explain" data-i="${i}">${esc(q.e||"")}</p></div>`;
  });
  h+=`</div><button class="btn primary" id="qzSubmit">Submit answers</button><div id="qzScore" style="margin-top:14px"></div>`;
  area.innerHTML=h;
  const answers={};
  $$('#quizForm .choice').forEach(b=>b.onclick=()=>{
    const i=b.dataset.i;answers[i]=+b.dataset.c;
    $$(`#quizForm .choice[data-i="${i}"]`).forEach(x=>x.classList.remove("sel"));b.classList.add("sel");
  });
  $("#qzSubmit").onclick=()=>{
    let correct=0;
    qs.forEach((q,i)=>{
      $$(`#quizForm .choice[data-i="${i}"]`).forEach(x=>{
        const ci=+x.dataset.c;x.disabled=true;
        if(ci===q.a)x.classList.add("correct");
        if(answers[i]===ci&&ci!==q.a)x.classList.add("wrong");
      });
      $(`.explain[data-i="${i}"]`).classList.add("show");
      if(answers[i]===q.a)correct++;
    });
    const pct=Math.round(correct/qs.length*100);
    let scoreh=`<p class="quiz-result">Score: ${correct}/${qs.length} (${pct}%)</p>`;
    if(sel!=="all"){
      const key="w"+sel;const prev=state.best[key]||0;
      if(pct>prev){state.best[key]=pct;save(state);scoreh+=`<p class="note">New best for Week ${sel}! 🎉</p>`;}
      else scoreh+=`<p class="note">Your best for Week ${sel}: ${prev}%</p>`;
      renderProgress();
    }
    scoreh+=`<p style="margin-top:8px"><button class="btn" id="qzAgain">Try again</button></p>`;
    $("#qzScore").innerHTML=scoreh;$("#qzSubmit").disabled=true;
    $("#qzAgain").onclick=()=>startQuiz(false);
    $("#qzScore").scrollIntoView({behavior:"smooth",block:"nearest"});
  };
}

/* ============ INIT ============ */
function renderAll(){renderProgress();renderPlan();}
renderAll();initSummary();initQuiz();
</script>
